name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: Create as draft release
        type: boolean
        default: true
      prerelease:
        description: Mark release as prerelease
        type: boolean
        default: false
      generate_release_notes:
        description: Generate GitHub release notes automatically
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  LLVM_VERSION: "21.1.8"
  ZIG_VERSION: "0.15.2"
  PYTHON_VERSION: "3.12"

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.meta.outputs.matrix }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      generate_release_notes: ${{ steps.meta.outputs.generate_release_notes }}
    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve VERSION and release tag
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_DRAFT: ${{ inputs.draft }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_GENERATE_RELEASE_NOTES: ${{ inputs.generate_release_notes }}
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          root = pathlib.Path.cwd()
          version = None
          for line in (root / "VERSION").read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if line.startswith("kinal="):
                  version = line.split("=", 1)[1].strip()
                  break
          if not version:
              raise SystemExit("failed to read kinal version from VERSION")

          expected_tag = f"v{version}"
          event_name = os.environ["EVENT_NAME"]
          ref_name = os.environ.get("REF_NAME", "")
          if event_name == "push" and ref_name != expected_tag:
              raise SystemExit(f"tag {ref_name} does not match VERSION {expected_tag}")

          entries = [
              {
                  "id": "windows-x64",
                  "name": "Windows x64",
                  "runs_on": "windows-latest",
                  "timeout": 75,
                  "family": "windows",
                  "msvc_arch": "amd64",
                  "host_tag": "win-x64",
                  "zig_cache_path": "~/AppData/Local/Kinal/toolchains/zig",
                  "llvm_cache_path": "Kinal-ThirdParty/.cache/llvm/prebuilt",
              },
              {
                  "id": "windows-arm64",
                  "name": "Windows arm64",
                  "runs_on": "windows-11-arm",
                  "timeout": 75,
                  "family": "windows",
                  "msvc_arch": "amd64_arm64",
                  "host_tag": "win-arm64",
                  "zig_cache_path": "~/AppData/Local/Kinal/toolchains/zig",
                  "llvm_cache_path": "Kinal-ThirdParty/.cache/llvm/prebuilt",
              },
              {
                  "id": "linux-x64",
                  "name": "Linux x64",
                  "runs_on": "ubuntu-22.04",
                  "timeout": 60,
                  "family": "linux",
                  "msvc_arch": "",
                  "host_tag": "linux-x64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
              },
              {
                  "id": "linux-arm64",
                  "name": "Linux arm64",
                  "runs_on": "ubuntu-24.04-arm",
                  "timeout": 60,
                  "family": "linux",
                  "msvc_arch": "",
                  "host_tag": "linux-arm64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
              },
              {
                  "id": "macos-arm64",
                  "name": "macOS arm64",
                  "runs_on": "macos-14",
                  "timeout": 60,
                  "family": "macos",
                  "msvc_arch": "",
                  "host_tag": "macos-arm64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
              },
              {
                  "id": "macos-x64",
                  "name": "macOS x64",
                  "runs_on": "macos-15-intel",
                  "timeout": 60,
                  "family": "macos",
                  "msvc_arch": "",
                  "host_tag": "macos-x64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
              },
          ]

          commit_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          tag = ref_name if event_name == "push" else expected_tag
          draft = "false" if event_name == "push" else (os.environ.get("INPUT_DRAFT") or "true")
          prerelease = "false" if event_name == "push" else (os.environ.get("INPUT_PRERELEASE") or "false")
          generate_release_notes = "true" if event_name == "push" else (os.environ.get("INPUT_GENERATE_RELEASE_NOTES") or "true")

          outputs = {
              "matrix": json.dumps({"include": entries}, separators=(",", ":")),
              "version": version,
              "tag": tag,
              "release_name": f"Kinal {version}",
              "commit_sha": commit_sha,
              "draft": draft.lower(),
              "prerelease": prerelease.lower(),
              "generate_release_notes": generate_release_notes.lower(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  print(f"{key}={value}", file=handle)
          PY

  build:
    needs: metadata
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.metadata.outputs.matrix) }}
    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit_sha }}
          path: Kinal

      - name: Checkout Kinal-ThirdParty
        uses: actions/checkout@v4
        with:
          repository: Kinal-Lang/Kinal-ThirdParty
          path: Kinal-ThirdParty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Cache LLVM prebuilt
        if: matrix.family == 'windows'
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ matrix.llvm_cache_path }}
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.host_tag }}

      - name: Fetch LLVM prebuilt
        if: matrix.family == 'windows' && steps.cache-llvm.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch llvm-prebuilt

      - name: Install LLVM 21
        if: matrix.family == 'linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev clang-21 lld-21 libclang-21-dev

      - name: Install LLVM 21
        if: matrix.family == 'macos'
        run: |
          brew install llvm@21
          echo "LLVM_DIR=$(brew --prefix llvm@21)/lib/cmake/llvm" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ${{ matrix.zig_cache_path }}
          key: zig-${{ env.ZIG_VERSION }}-${{ matrix.host_tag }}

      - name: Fetch Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch zig-prebuilt

      - name: Setup MSVC environment
        if: matrix.family == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build release distribution
        working-directory: Kinal
        run: python x.py dist

      - name: Run smoke tests
        working-directory: Kinal
        run: python x.py test --release

      - name: Run full regression tests
        working-directory: Kinal
        run: python x.py test --release --full

      - name: Prepare release archives and checksums
        working-directory: Kinal
        run: python -m infra.scripts.release_assets prepare --host-tag ${{ matrix.host_tag }} --version ${{ needs.metadata.outputs.version }} --output-dir release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.host_tag }}
          path: |
            Kinal/release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [metadata, build]
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.commit_sha }}
          path: Kinal

      - name: Download built release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Merge checksum manifests
        working-directory: Kinal
        run: python -m infra.scripts.release_assets merge --input-dir ../release-assets --output ../release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ needs.metadata.outputs.commit_sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: ${{ needs.metadata.outputs.draft == 'true' }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: ${{ needs.metadata.outputs.generate_release_notes == 'true' }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true