name: Docs and Scripts Sync

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "infra/assets/scripts/**"
  workflow_dispatch:

concurrency:
  group: docs-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SSH_HOST: ${{ secrets.KINAL_SITE_SSH_HOST }}
  SSH_PORT: ${{ secrets.KINAL_SITE_SSH_PORT }}
  SSH_USER: ${{ secrets.KINAL_SITE_SSH_USER }}
  SSH_PASSWORD: ${{ secrets.KINAL_SITE_SSH_PASSWORD }}
  SSH_KEY: ${{ secrets.KINAL_SITE_SSH_KEY }}
  SERVICE_NAME: ${{ secrets.KINAL_SITE_SERVICE_NAME }}
  SITE_ROOT_HINT: ${{ secrets.KINAL_SITE_ROOT_HINT }}

jobs:
  deploy-docs:
    name: Upload docs and scripts to kinal.org
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in SSH_HOST SSH_USER; do
            if [ -z "${!name:-}" ]; then
              echo "::warning::${name} is not configured; docs/scripts deployment will be skipped."
              missing=1
            fi
          done
          if [ -z "${SSH_KEY:-}" ] && [ -z "${SSH_PASSWORD:-}" ]; then
            echo "::warning::Either SSH_KEY or SSH_PASSWORD must be configured; docs/scripts deployment will be skipped."
            missing=1
          fi
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH client
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          port="${SSH_PORT:-22}"
          ssh-keyscan -p "$port" "$SSH_HOST" >> "$HOME/.ssh/known_hosts"
          if [ -n "${SSH_KEY:-}" ]; then
            key_path="$HOME/.ssh/kinal_site"
            printf '%s\n' "$SSH_KEY" > "$key_path"
            chmod 600 "$key_path"
            echo "KINAL_SSH_KEY=$key_path" >> "$GITHUB_ENV"
          fi
          echo "KINAL_SSH_PORT=$port" >> "$GITHUB_ENV"

      - name: Install sshpass for password auth
        if: steps.config.outputs.ready == 'true' && env.SSH_KEY == '' && env.SSH_PASSWORD != ''
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Package docs and scripts
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy/site-sync/docs deploy/site-sync/scripts
          cp -a docs/. deploy/site-sync/docs/
          cp -a infra/assets/scripts/. deploy/site-sync/scripts/
          tar -czf deploy/kinal-site-content.tar.gz -C deploy/site-sync .

      - name: Upload docs and scripts archive
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sync_tmp="/tmp/kinal-site-content-${GITHUB_RUN_ID}.tar.gz"
          if [ -n "${SSH_KEY:-}" ]; then
            scp -P "$KINAL_SSH_PORT" -i "$KINAL_SSH_KEY" "deploy/kinal-site-content.tar.gz" "$SSH_USER@$SSH_HOST:$sync_tmp"
          else
            export SSHPASS="$SSH_PASSWORD"
            sshpass -e scp \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -P "$KINAL_SSH_PORT" \
              "deploy/kinal-site-content.tar.gz" \
              "$SSH_USER@$SSH_HOST:$sync_tmp"
          fi
          echo "KINAL_REMOTE_SYNC_TMP=$sync_tmp" >> "$GITHUB_ENV"

      - name: Install docs and scripts on remote kinal.org site
        if: steps.config.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          remote_cmd=(
            ssh
            -p "$KINAL_SSH_PORT"
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          if [ -n "${SSH_KEY:-}" ]; then
            remote_cmd+=(-i "$KINAL_SSH_KEY")
          else
            export SSHPASS="$SSH_PASSWORD"
            remote_cmd=(
              sshpass -e ssh
              -p "$KINAL_SSH_PORT"
              -o StrictHostKeyChecking=yes
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
              -o PreferredAuthentications=password
              -o PubkeyAuthentication=no
            )
          fi
          "${remote_cmd[@]}" "$SSH_USER@$SSH_HOST" \
            "SERVICE_NAME='${SERVICE_NAME:-}' SITE_ROOT_HINT='${SITE_ROOT_HINT:-}' KINAL_REMOTE_SYNC_TMP='$KINAL_REMOTE_SYNC_TMP' bash -s" <<'EOF'
          set -euo pipefail

          append_unique_target() {
            local value="$1"
            local array_name="$2"
            [ -n "$value" ] || return 0
            eval "case \" \${${array_name}[*]} \" in *\" $value \"*) ;; *) ${array_name}+=(\"$value\") ;; esac"
          }

          append_content_targets_for_root() {
            local root="$1"
            [ -n "$root" ] || return 0
            [ -d "$root" ] || return 0

            if [ -d "$root/managed/static" ]; then
              append_unique_target "$root/managed/static/docs" doc_targets
              append_unique_target "$root/managed/static/scripts" script_targets
              append_unique_target "$root/managed/install.sh" root_script_targets
            fi
            if [ -d "$root/src/web/managed/static" ] || [ -f "$root/build.py" ]; then
              append_unique_target "$root/src/web/managed/static/docs" doc_targets
              append_unique_target "$root/src/web/managed/static/scripts" script_targets
              append_unique_target "$root/src/web/managed/install.sh" root_script_targets
            fi
            if [ -d "$root/build/managed/static" ]; then
              append_unique_target "$root/build/managed/static/docs" doc_targets
              append_unique_target "$root/build/managed/static/scripts" script_targets
              append_unique_target "$root/build/managed/install.sh" root_script_targets
            fi
          }

          install_tree() {
            local source_dir="$1"
            local label="$2"
            shift 2
            local targets=("$@")

            if [ ! -d "$source_dir" ]; then
              echo "$label source directory is missing: $source_dir" >&2
              exit 1
            fi
            if [ "${#targets[@]}" -eq 0 ]; then
              echo "no remote ${label} targets were discovered" >&2
              exit 1
            fi

            for target in "${targets[@]}"; do
              mkdir -p "$(dirname "$target")"
              rm -rf "$target"
              mkdir -p "$target"
              cp -a "$source_dir"/. "$target"/
              if [ "$label" = "scripts" ]; then
                find "$target" -type f -name '*.sh' -exec chmod 0755 {} +
              fi
              echo "${label} installed at: $target"
            done
          }

          install_file() {
            local source_file="$1"
            local mode="$2"
            shift 2
            local targets=("$@")

            if [ ! -f "$source_file" ]; then
              echo "source file is missing: $source_file" >&2
              exit 1
            fi
            if [ "${#targets[@]}" -eq 0 ]; then
              echo "no remote file targets were discovered for ${source_file##*/}" >&2
              exit 1
            fi

            for target in "${targets[@]}"; do
              mkdir -p "$(dirname "$target")"
              cp -a "$source_file" "$target"
              chmod "$mode" "$target"
              echo "file installed at: $target"
            done
          }

          extract_root="$(mktemp -d)"
          cleanup() {
            rm -rf "$extract_root"
            rm -f "$KINAL_REMOTE_SYNC_TMP"
          }
          trap cleanup EXIT

          tar -xzf "$KINAL_REMOTE_SYNC_TMP" -C "$extract_root"
          [ -d "$extract_root/docs" ] || { echo "sync archive did not contain docs/" >&2; exit 1; }
          [ -d "$extract_root/scripts" ] || { echo "sync archive did not contain scripts/" >&2; exit 1; }

          doc_targets=()
          script_targets=()
          root_script_targets=()

          append_content_targets_for_root "${SITE_ROOT_HINT:-}"

          service_workdir=""
          if [ -n "${SERVICE_NAME:-}" ]; then
            service_workdir="$(systemctl show -p WorkingDirectory --value "$SERVICE_NAME" 2>/dev/null || true)"
            append_content_targets_for_root "$service_workdir"
            append_content_targets_for_root "$(dirname "$service_workdir")"
          fi

          for candidate in \
            "/srv/kinal.org/current" \
            "/srv/kinal.org" \
            "$HOME/kinal.org" \
            "/root/kinal.org" \
            "/opt/kinal.org" \
            "/usr/local/src/kinal.org"; do
            append_content_targets_for_root "$candidate"
          done

          append_unique_target "/var/www/kinal-static/current/static/docs" doc_targets
          append_unique_target "/var/www/kinal-static/static/docs" doc_targets
          append_unique_target "/var/www/kinal-static/current/static/scripts" script_targets
          append_unique_target "/var/www/kinal-static/static/scripts" script_targets
          append_unique_target "/var/www/kinal-static/current/install.sh" root_script_targets
          append_unique_target "/var/www/kinal-static/install.sh" root_script_targets

          install_tree "$extract_root/docs" docs "${doc_targets[@]}"
          install_tree "$extract_root/scripts" scripts "${script_targets[@]}"
          install_file "$extract_root/scripts/install.sh" 0755 "${root_script_targets[@]}"

          if [ -n "${SERVICE_NAME:-}" ]; then
            systemctl restart "$SERVICE_NAME"
            echo "restarted service: $SERVICE_NAME"
          fi

          printf 'resolved docs targets:\n'
          printf ' - %s\n' "${doc_targets[@]}"
          printf 'resolved script targets:\n'
          printf ' - %s\n' "${script_targets[@]}"
          printf 'resolved root script targets:\n'
          printf ' - %s\n' "${root_script_targets[@]}"
          EOF

      - name: Deployment skipped
        if: steps.config.outputs.ready != 'true'
        run: echo "Docs/scripts deployment skipped because required secrets are not configured."
