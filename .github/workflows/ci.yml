# ────────────────────────────────────────────────────────────────
#  Kinal CI — build & test on every push / pull-request
# ────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [ main, dev, "release/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── shared env ──────────────────────────────────────────────────
env:
  ZIG_VERSION: "0.15.2"
  PYTHON_VERSION: "3.12"

jobs:
  # ═══════════════════════════════════════════════
  #  Windows x64
  # ═══════════════════════════════════════════════
  windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          path: Kinal

      - name: Checkout Kinal-ThirdParty
        uses: actions/checkout@v4
        with:
          repository: Kinal-Lang/Kinal-ThirdParty
          path: Kinal-ThirdParty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      # Windows uses the clang+llvm archive (includes full dev libs)
      - name: Cache LLVM prebuilt
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: Kinal-ThirdParty/.cache/llvm/prebuilt
          key: llvm-21.1.8-win-x64

      - name: Fetch LLVM prebuilt
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch llvm-prebuilt

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Kinal/toolchains/zig
          key: zig-${{ env.ZIG_VERSION }}-win-x64

      - name: Fetch Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch zig-prebuilt

      # Run inside VS Developer environment so kinal can find MSVC libs
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build release distribution
        working-directory: Kinal
        run: python x.py dist

      - name: Run smoke tests
        working-directory: Kinal
        run: python x.py test --release

      - name: Run full regression tests
        working-directory: Kinal
        run: python x.py test --release --full

      - name: Upload release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kinal-win-x64
          path: Kinal/artifacts/release/Kinal-win-x64.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-win-x64
          path: Kinal/out/test/
          if-no-files-found: warn
          retention-days: 7

  # ═══════════════════════════════════════════════
  #  Linux x64
  # ═══════════════════════════════════════════════
  linux:
    name: Linux x64
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          path: Kinal

      - name: Checkout Kinal-ThirdParty
        uses: actions/checkout@v4
        with:
          repository: Kinal-Lang/Kinal-ThirdParty
          path: Kinal-ThirdParty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      # Install LLVM 21 from official APT repo (includes dev libs + clang)
      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev clang-21 lld-21 libclang-21-dev

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.cache/kinal/toolchains/zig
          key: zig-${{ env.ZIG_VERSION }}-linux-x64

      - name: Fetch Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch zig-prebuilt

      - name: Build release distribution
        working-directory: Kinal
        run: python x.py dist

      - name: Run smoke tests
        working-directory: Kinal
        run: python x.py test --release

      - name: Run full regression tests
        working-directory: Kinal
        run: python x.py test --release --full

      - name: Upload release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kinal-linux-x64
          path: Kinal/artifacts/release/Kinal-linux-x64.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-x64
          path: Kinal/out/test/
          if-no-files-found: warn
          retention-days: 7

  # ═══════════════════════════════════════════════
  #  macOS arm64
  # ═══════════════════════════════════════════════
  macos:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          path: Kinal

      - name: Checkout Kinal-ThirdParty
        uses: actions/checkout@v4
        with:
          repository: Kinal-Lang/Kinal-ThirdParty
          path: Kinal-ThirdParty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      # Install LLVM via Homebrew (includes dev libs; doesn't conflict with Xcode)
      - name: Install LLVM 21
        run: |
          brew install llvm@21
          echo "LLVM_DIR=$(brew --prefix llvm@21)/lib/cmake/llvm" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.cache/kinal/toolchains/zig
          key: zig-${{ env.ZIG_VERSION }}-macos-arm64

      - name: Fetch Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch zig-prebuilt

      - name: Build release distribution
        working-directory: Kinal
        run: python x.py dist

      - name: Run smoke tests
        working-directory: Kinal
        run: python x.py test --release

      - name: Run full regression tests
        working-directory: Kinal
        run: python x.py test --release --full

      - name: Upload release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kinal-macos-arm64
          path: Kinal/artifacts/release/Kinal-macos-arm64.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos-arm64
          path: Kinal/out/test/
          if-no-files-found: warn
          retention-days: 7
          retention-days: 7
