# ────────────────────────────────────────────────────────────────
#  Kinal CI — build & test on every push / pull-request
# ────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [ main, dev, "release/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_windows_x64:
        description: Run Windows x64
        type: boolean
        default: true
      run_windows_arm64:
        description: Run Windows ARM64
        type: boolean
        default: true
      run_linux_x64:
        description: Run Linux x64
        type: boolean
        default: true
      run_linux_arm64:
        description: Run Linux ARM64
        type: boolean
        default: true
      run_macos_arm64:
        description: Run macOS ARM64
        type: boolean
        default: true
      run_macos_x64:
        description: Run macOS x64
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── shared env ──────────────────────────────────────────────────
env:
  LLVM_VERSION: "21.1.8"
  ZIG_VERSION: "0.15.2"
  PYTHON_VERSION: "3.12"

jobs:
  select_matrix:
    name: Select CI matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      has_entries: ${{ steps.select.outputs.has_entries }}
    steps:
      - name: Build selected matrix
        id: select
        shell: bash
        env:
          RUN_WINDOWS_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_windows_x64 }}
          RUN_WINDOWS_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_windows_arm64 }}
          RUN_LINUX_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_linux_x64 }}
          RUN_LINUX_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_linux_arm64 }}
          RUN_MACOS_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_macos_arm64 }}
          RUN_MACOS_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.run_macos_x64 }}
        run: |
          python <<'PY'
          import json
          import os

          entries = [
              {
                  "id": "windows-x64",
                  "name": "Windows x64",
                  "runs_on": "windows-latest",
                  "timeout": 60,
                  "family": "windows",
                  "host_tag": "win-x64",
                  "zig_cache_path": "~/AppData/Local/Kinal/toolchains/zig",
                  "llvm_cache_path": "Kinal-ThirdParty/.cache/llvm/prebuilt",
                  "upload_name": "test-results-win-x64",
                  "enabled": os.environ["RUN_WINDOWS_X64"] == "true",
              },
              {
                  "id": "windows-arm64",
                  "name": "Windows arm64",
                  "runs_on": "windows-11-arm",
                  "timeout": 60,
                  "family": "windows",
                  "host_tag": "win-arm64",
                  "zig_cache_path": "~/AppData/Local/Kinal/toolchains/zig",
                  "llvm_cache_path": "Kinal-ThirdParty/.cache/llvm/prebuilt",
                  "upload_name": "test-results-win-arm64",
                  "enabled": os.environ["RUN_WINDOWS_ARM64"] == "true",
              },
              {
                  "id": "linux-x64",
                  "name": "Linux x64",
                  "runs_on": "ubuntu-22.04",
                  "timeout": 45,
                  "family": "linux",
                  "host_tag": "linux-x64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
                  "upload_name": "test-results-linux-x64",
                  "enabled": os.environ["RUN_LINUX_X64"] == "true",
              },
              {
                  "id": "linux-arm64",
                  "name": "Linux arm64",
                  "runs_on": "ubuntu-24.04-arm",
                  "timeout": 45,
                  "family": "linux",
                  "host_tag": "linux-arm64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
                  "upload_name": "test-results-linux-arm64",
                  "enabled": os.environ["RUN_LINUX_ARM64"] == "true",
              },
              {
                  "id": "macos-arm64",
                  "name": "macOS arm64",
                  "runs_on": "macos-14",
                  "timeout": 45,
                  "family": "macos",
                  "host_tag": "macos-arm64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
                  "upload_name": "test-results-macos-arm64",
                  "enabled": os.environ["RUN_MACOS_ARM64"] == "true",
              },
              {
                  "id": "macos-x64",
                  "name": "macOS x64",
                  "runs_on": "macos-15-intel",
                  "timeout": 45,
                  "family": "macos",
                  "host_tag": "macos-x64",
                  "zig_cache_path": "~/.cache/kinal/toolchains/zig",
                  "upload_name": "test-results-macos-x64",
                  "enabled": os.environ["RUN_MACOS_X64"] == "true",
              },
          ]

          selected = []
          for entry in entries:
              enabled = entry.pop("enabled")
              if enabled:
                  selected.append(entry)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"matrix={json.dumps({'include': selected}, separators=(',', ':'))}", file=output)
              print(f"has_entries={'true' if selected else 'false'}", file=output)
          PY

  test:
    needs: select_matrix
    name: ${{ matrix.name }}
    if: ${{ needs.select_matrix.outputs.has_entries == 'true' }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select_matrix.outputs.matrix) }}

    steps:
      - name: Checkout Kinal
        uses: actions/checkout@v4
        with:
          path: Kinal

      - name: Checkout Kinal-ThirdParty
        uses: actions/checkout@v4
        with:
          repository: Kinal-Lang/Kinal-ThirdParty
          path: Kinal-ThirdParty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Cache LLVM prebuilt
        if: matrix.family == 'windows'
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ matrix.llvm_cache_path }}
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.host_tag }}

      - name: Fetch LLVM prebuilt
        if: matrix.family == 'windows' && steps.cache-llvm.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch llvm-prebuilt

      - name: Install LLVM 21
        if: matrix.family == 'linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev clang-21 lld-21 libclang-21-dev

      - name: Install LLVM 21
        if: matrix.family == 'macos'
        run: |
          brew install llvm@21
          echo "LLVM_DIR=$(brew --prefix llvm@21)/lib/cmake/llvm" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ${{ matrix.zig_cache_path }}
          key: zig-${{ env.ZIG_VERSION }}-${{ matrix.host_tag }}

      - name: Fetch Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        working-directory: Kinal
        run: python x.py fetch zig-prebuilt

      - name: Setup MSVC environment
        if: matrix.family == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build release distribution
        working-directory: Kinal
        run: python x.py dist

      - name: Run smoke tests
        working-directory: Kinal
        run: python x.py test --release

      - name: Run full regression tests
        working-directory: Kinal
        run: python x.py test --release --full

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_name }}
          path: Kinal/out/test/
          if-no-files-found: warn
          retention-days: 7
